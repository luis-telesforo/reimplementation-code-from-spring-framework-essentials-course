# This file was generated by the Gradle 'init' task.
# https://docs.gradle.org/current/userguide/version_catalogs.html#sec::toml-dependencies-format
[versions]
junit-version = "6.0.0"
checkstyle = "13.4.0"
java = "25"
jacoco = "0.8.14"

[libraries]
junit-platform-bom = { module = "org.junit:junit-bom", version.ref = "junit-version" }
junit-jupiter = {module = "org.junit.jupiter:junit-jupiter"}
junit-platform-launcher = {module ="org.junit.platform:junit-platform-launcher"}

[plugins]
java-library = {id = "java-library"}
java-library-conventions = {id = "buildlogic.java-library-conventions"}